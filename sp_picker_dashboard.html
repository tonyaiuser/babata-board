  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  /* Card */

  .card-img.loaded { background: #f8f8f8; }
  .card-body { padding: 14px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-title { font-size: 0.875rem; font-weight: 600; line-height: 1.4; color: var(--text); flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .btn-sample { flex: 1; text-align: center; padding: 7px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; text-decoration: none; background: var(--accent); color: white; transition: background .15s; border: none; cursor: pointer; }

  .flagship-tag { font-size: 0.7rem; padding: 2px 6px; background: #fef3c7; color: #b45309; border-radius: 4px; font-weight: 600; }

  .empty-icon { font-size: 3rem; margin-bottom: 12px; }

  .rank { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,.6); color: white; font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; z-index: 2; }

  [/jet fan|portable fan/i, '便携喷气风扇'],
  [/military watch/i, '军事风格双显手表'],
  [/tactical cargo pants/i, '战术多口袋工装裤'],
  [/touchscreen display/i, '无线智能触控屏'],
  [/headlight/i, '车灯修复套装'],
  [/magnifying glass/i, '折叠放大镜'],
  [/sandal/i, '露趾凉鞋'],
  [/summer.*dress|babydoll dress|maxi dress/i, '夏季连衣裙'],
  [/sneaker|platform shoe/i, '厚底运动鞋'],
  [/striped.*pants|side pocket pants/i, '条纹侧口袋休闲裤'],
  [/spray|degreaser/i, '多用途去污喷雾'],
  [/gel liner/i, '防水眼线胶笔'],
  [/hair removal cream/i, '温和脱毛膏'],
  [/marble/i, '大理石纹地面漆'],
  [/tile wax|tire wax/i, '轮胎光亮蜡'],
  [/mug/i, '马克杯'],
  [/oral irrigator|water flosser/i, '便携冲牙器'],
  [/camping.*bag|storage bag/i, '户外露营收纳袋'],
  [/PTZ camera/i, '太阳能 PTZ 摄像头'],
  [/fake.*dress|二件套|blatt/i, '仿两件套连衣裙'],
  [/lace.*dress|babydoll/i, '镂空蕾丝连衣裙'],
  [/cloud slide|non-slip.*sole/i, '厚底防滑云朵拖鞋'],
];

function getChineseTitle(title) {
  // Remove emojis and promo noise for matching
  const clean = title.replace(/[^ -~À-ɏ]/g, '').trim();
  for (const [re, cn] of CN_MAP) {
    if (re.test(clean) || re.test(title)) return cn;
  }
  // Fallback: extract main noun
  return extractNoun(clean);
}

function extractNoun(t) {
  const cleaned = t.replace(/\d+%\s*OFF|SALE|Rabatt|FREE|LIMITED|LAST DAY|HOT|🔥|⚡|💎|🏆|💥|✨|⏳|\bBUY\b|\bGET\b/gi,'').trim();
  const words = cleaned.split(/[\s,\-–|]+/).filter(w => w.length > 2).slice(0,3);
  return words.join(' ') || t.slice(0,30);
}

function getCategory(title) {
  for (const cat of CATS.slice(1)) {
    if (cat.match(title)) return cat.id;
  }
  return 'other';
}

function getCatLabel(id) {
  const c = CATS.find(x => x.id === id);
  return c ? c.label : '📦 其他';
}

function scoreColor(s) {
  if (s >= 35) return 'score-high';
  if (s >= 22) return 'score-mid';
  return 'score-low';
}

// ISO 货币代码 → 符号（未收录的直接显示代码）
const CURRENCY_SYMBOLS = {
  USD: '$', GBP: '£', EUR: '€', CAD: 'CA$', AUD: 'A$', NZD: 'NZ$',
  JPY: '¥', CNY: '¥', CHF: 'CHF ', SEK: 'kr ', NOK: 'kr ', DKK: 'kr ',
  PLN: 'zł ', MXN: 'MX$', BRL: 'R$', INR: '₹', AED: 'AED ', SAR: 'SAR ',
};
function currencySymbol(code) {
  if (!code) return '';
  return CURRENCY_SYMBOLS[code] || (code + ' ');
}

function rankBadge(i) {
  if (i === 0) return '<span class="rank rank-1">🥇 #1</span>';
  if (i === 1) return '<span class="rank rank-2">🥈 #2</span>';
  if (i === 2) return '<span class="rank rank-3">🥉 #3</span>';
  if (i < 10) return `<span class="rank">#${i+1}</span>`;
  return '';
}

function stripEmoji(s) {
  return s.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}]+/gu, '').replace(/\s+/g,' ').trim();
}

// Gradient palettes for placeholders
const GRADIENTS = [
  ['#e0e7ff','#c7d2fe'],['#fce7f3','#fbcfe8'],['#ecfdf5','#a7f3d0'],
  ['#fef3c7','#fde68a'],['#eff6ff','#bfdbfe'],['#f5f3ff','#ddd6fe'],
  ['#fff1f2','#fecdd3'],['#f0fdfa','#99f6e4'],
];
function cardGradient(i) {
  const [a,b] = GRADIENTS[i % GRADIENTS.length];
  return `background: linear-gradient(135deg, ${a} 0%, ${b} 100%);`;
}

// Category icons
const CAT_ICONS = {
  beauty:'💄',clothing:'👗',home:'🏠',auto:'🚗',electronics:'📱',tools:'🔧',all:'📦'
};
function catIcon(id) { return CAT_ICONS[id] || '📦'; }

// SVG sparkline for trend data
function sparkline(trend) {
  if (!trend || Object.keys(trend).length < 2) return '';
  const dates = Object.keys(trend).sort();
  const vals = dates.map(d => trend[d]);
  const max = Math.max(...vals, 1);
  const min = Math.min(...vals, 0);
  const range = max - min || 1;
  const w = 80, h = 28, pad = 3;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (w - 2 * pad);
    const y = h - pad - ((v - min) / range) * (h - 2 * pad);
    return [x, y];
  });
  const polyline = pts.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const last = pts[pts.length - 1];
  const color = vals[vals.length-1] >= vals[0] ? '#10b981' : '#ef4444';
  const lastVal = vals[vals.length-1];
  const diff = vals[vals.length-1] - vals[0];
  const arrow = diff > 0 ? '\u2191' : diff < 0 ? '\u2193' : '';
  return `<span class="trend-wrap" title="${dates.map((d,i)=>d.slice(5)+': '+vals[i]+'家').join('\\n')}">
    <svg width="${w}" height="${h}" style="vertical-align:middle;">
      <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.5" fill="${color}"/>
    </svg>
    <span style="color:${color};font-weight:600;">${arrow}${lastVal}</span>
  </span>`;
}

let activecat = 'all';

function filtered() {
  let data = RAW_DATA.map((p,i)=>({...p,_idx:i,_cat:getCategory(p.title)}));

  if (activecat !== 'all') {
    const catDef = CATS.find(x=>x.id===activecat);
    if (catDef) data = data.filter(p => catDef.match(p.title));
  }
  // 上架日期（按天）降序，缺失 published_at 的排最后；同天内 score 降序，再 age_hours 升序
  data.sort((a,b) => {
    const da = (a.published_at || '').slice(0,10), db = (b.published_at || '').slice(0,10);
    if (da !== db) return da < db ? 1 : -1;
    return (b.score || 0) - (a.score || 0) || (a.age_hours ?? 999) - (b.age_hours ?? 999);
  });
  return data;
}

function render() {
  const data = filtered();
  document.getElementById('result-count').textContent = data.length;
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!data.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML = data.slice(0,100).map((p, vi) => {
    const orig_i = p._idx;
    const cn = getChineseTitle(p.title);
    const clean = stripEmoji(p.title);
    const hasFlag = (p.flagship_count || 0) > 0;
    const priceNum = parseFloat(p.price);
    const hasPrice = Number.isFinite(priceNum);
    const currency = currencySymbol(p.currency);
    const pubDate = (p.published_at || p.date || '').slice(0, 10);
    const dateStr = pubDate.slice(5); // MM-DD
    const delta = Math.max(Number(p.delta_1d || 0), Number(p.spread_delta || 0));
    const fbCount = Number(p.fb_hit_count || 0);
    const changeLabel = p.change_label || '';

    const imgHtml = p.image_url
      ? `<img class="card-img" src="${p.image_url}" alt="${clean.replace(/"/g,'&quot;')}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\' style=\\'${cardGradient(orig_i).replace(/'/g,"\\'")}\\'><span>${catIcon(p._cat)}</span></div>'">`
      : `<div class="card-img-placeholder" style="${cardGradient(orig_i)}"><span>${catIcon(p._cat)}</span></div>`;
    const trendHtml = sparkline(p.trend);

    return `<div class="card${p.is_new ? ' card-new' : ''}">
      <div class="card-img-wrap">
        ${rankBadge(vi)}
        ${p.is_new ? '<span class="badge-new">🆕 NEW</span>' : ''}
        ${imgHtml}
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title" title="${clean.replace(/"/g,'&quot;')}">${clean || p.title}</div>
          <span class="score-badge ${scoreColor(p.score)}">⭐ ${p.score}</span>
        </div>
        <div class="card-cn">🇨🇳 ${cn}</div>
        <div class="card-meta">
          ${hasPrice ? `<span class="meta-chip chip-price">💰 ${currency}${priceNum.toFixed(2)}</span>` : ''}
          <span class="meta-chip chip-sites">🏪 ${p.sites_count} 家</span>
          ${hasFlag ? `<span class="meta-chip chip-flagship">⭐ ${p.flagship_count || 0} 旗舰</span>` : ''}
          ${changeLabel ? `<span class="meta-chip chip-change">${changeLabel}</span>` : ''}
          ${delta > 0 ? `<span class="meta-chip chip-growth">+${delta}站</span>` : ''}
          ${fbCount > 0 ? `<span class="meta-chip chip-fb">FB ${fbCount}</span>` : ''}
          ${p.is_lp ? `<span class="meta-chip chip-lp">LP</span>` : ''}
          <span class="meta-chip chip-date">🛒 ${dateStr}</span>
          ${trendHtml}
        </div>
        <div class="card-actions">
          <a class="btn-sample" href="${p.sample_url}" target="_blank" rel="noopener">🔗 样品链接</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function initCatTabs() {
  const wrap = document.getElementById('cat-tabs');
  // Count per category
  const counts = {};
  RAW_DATA.forEach(p => {
    const cat = getCategory(p.title);
    counts[cat] = (counts[cat]||0)+1;
  });
  
  const tabData = [
    ...CATS.map(c => ({...c, count: c.id==='all' ? RAW_DATA.length : (counts[c.id]||0)})),
    {id:'other', label:'📦 其他', match:()=>true, count: counts['other']||0}
  ].filter((c,i,arr) => c.id==='all' || c.count>0 || !arr.find(x=>x.id===c.id && x!==c));
  
  wrap.innerHTML = tabData.map(c =>
    `<button class="cat-tab${activecat===c.id?' active':''}" data-id="${c.id}" onclick="setcat('${c.id}')">${c.label} <span style="opacity:.6">${c.count}</span></button>`
  ).join('');
}

function setcat(id) {
  activecat = id;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.id===id));
  render();
}

function initStats() {
  const total = RAW_DATA.length;
  const withFlag = RAW_DATA.filter(p=>(p.flagship_count||0)>0).length;
  const maxScore = Math.max(...RAW_DATA.map(p=>p.score));
  const avgSites = (RAW_DATA.reduce((a,p)=>a+p.sites_count,0)/total).toFixed(1);
  const newCount = RAW_DATA.filter(p=>p.is_new).length;
  const changeCount = RAW_DATA.filter(p=>(p.dashboard_priority||0)>0).length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-pill">📦 <strong>${total}</strong> 个商品</div>
    <div class="stat-pill">⭐ 最高分 <strong>${maxScore}</strong></div>
    <div class="stat-pill">🏪 平均铺货 <strong>${avgSites}</strong> 家</div>
    <div class="stat-pill">🔥 旗舰命中 <strong>${withFlag}</strong> 个</div>
    ${changeCount ? `<div class="stat-pill">📈 有变化 <strong>${changeCount}</strong> 个</div>` : ''}
    ${newCount ? `<div class="stat-pill">🆕 新品 <strong>${newCount}</strong> 个</div>` : ''}
  `;
  document.getElementById('updated-time').textContent = new Date().toLocaleDateString('zh-CN');

  // Update date range in header
  const dates = RAW_DATA.map(p=>p.date).filter(Boolean);
  if (dates.length) {
    const sorted = [...new Set(dates)].sort();
    document.getElementById('header-meta').textContent =
      '数据来源：热榜 · 最近 ' + sorted.length + ' 天汇总 · ' + sorted[0] + ' ~ ' + sorted[sorted.length-1];
  }
}

// Init
initStats();
initCatTabs();
render();
</script>
